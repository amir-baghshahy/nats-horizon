root = "."
tmp_dir = "tmp"
exclude_dir = ["tmp", "vendor", "web", "node_modules", "bin", "dist", "docs", ".git"]

[build]
cmd = "go build -o ./tmp/server ./cmd/server"
bin = "tmp/server"
include_ext = ["go"]
exclude_ext = ["_test.go"]
delay = 1000
stop_on_error = true

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
